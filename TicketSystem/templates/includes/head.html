{% load static %}
<!-- Floating Glass Header -->
<header class="glass-header">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-6 col-md-4">
        <a href="/" class="navbar-brand">
          <i class="fa-solid fa-ticket text-accent"></i> NexTix
        </a>
      </div>
      <div class="col-6 col-md-8 text-end">
        <nav class="d-none d-md-inline-block me-3">
          <a href="/" class="nav-link d-inline-block">Events</a>
          {% if user.is_authenticated %}
            <a href="{% url 'event-dashboard' %}" class="nav-link d-inline-block">Dashboard</a>
          {% endif %}
        </nav>
        
        {% if user.is_authenticated %}
          <a href="{% url 'create-event' %}" class="btn-accent me-2"><i class="fa-solid fa-plus me-1"></i> Create Event</a>
          <a href="{% url 'user-logout' %}" class="btn-glass"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        {% else %}
          <a href="{% url 'user-login' %}" class="btn-glass me-2">Login</a>
          <a href="{% url 'user-login' %}" class="btn-accent">Sign Up</a>
        {% endif %}
      </div>
    </div>
  </div>
</header>

<!-- Messages -->
<div style="position:fixed; right:20px; top:100px; z-index: 1050; width: 300px;">
  {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-lg" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
  {% endif %}
</div>
